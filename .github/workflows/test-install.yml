name: Test Installation
on:
  pull_request:
    paths:
      - 'scripts/install.ps1'
      - 'scripts/install.sh'
      - 'pyproject.toml'
      - 'scripts/setup_models.py'
      - '.github/workflows/test-install.yml'
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: python
        run: |
          import json
          import os
          
          is_pr = "${{ github.event_name }}" == "pull_request"
          
          if is_pr:
              matrix = [
                  {"os": "ubuntu-24.04", "python": "3.12", "install": "fresh", "hardware": "cpu"},
                  {"os": "windows-2022", "python": "3.12", "install": "fresh", "hardware": "cpu"}
              ]
          else:
              matrix = []
              # Primary matrix on Python 3.12 for all OS / Install / Hardware combos
              for os_name in ["ubuntu-24.04", "windows-2022", "macos-14"]:
                  for inst in ["fresh", "upgrade"]:
                      for hw in ["cpu", "mock_cuda", "mock_rocm"]:
                          if hw == "mock_rocm" and os_name != "ubuntu-24.04": continue
                          if hw == "mock_cuda" and os_name not in ["ubuntu-24.04", "windows-2022"]: continue
                          matrix.append({"os": os_name, "python": "3.12", "install": inst, "hardware": hw})
              
              # Python 3.11 compatibility sanity checks
              for os_name in ["ubuntu-24.04", "windows-2022", "macos-14"]:
                  matrix.append({"os": os_name, "python": "3.11", "install": "fresh", "hardware": "cpu"})
                              
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': matrix})}\n")

  test-install:
    needs: setup-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 brew install libomp
        
      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~\AppData\Local\uv\cache
          key: ${{ runner.os }}-uv-v3-${{ matrix.python }}-${{ hashFiles('pyproject.toml') }}
          
      - name: Runner Sanitization (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Check for pre-installed uv
          if (Get-Command uv -ErrorAction SilentlyContinue) {
             Write-Host "Pre-installed uv exists, proceeding. Our scripts reinstall or use it."
          }

      - name: Setup Baseline for Upgrade (Unix)
        if: matrix.install == 'upgrade' && runner.os != 'Windows'
        shell: bash
        run: |
          # Use a baseline commit that had early motif tooling
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          uv tool install "git+https://github.com/AdityaWagh19/Motif@1efcb83" --python ${{ matrix.python }}
          motif --version || true

      - name: Setup Baseline for Upgrade (Windows)
        if: matrix.install == 'upgrade' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://astral.sh/uv/install.ps1 -UseBasicParsing | Invoke-Expression
          $env:Path = "$HOME\.cargo\bin;$HOME\.local\bin;$env:Path"
          uv tool install "git+https://github.com/AdityaWagh19/Motif@1efcb83" --python ${{ matrix.python }}
          try { motif --version } catch {}
          $global:LASTEXITCODE = 0

      - name: Inject Mock Hardware (Linux & Windows)
        if: matrix.hardware != 'cpu'
        shell: bash
        run: |
          mkdir -p $HOME/mock_bin
          if [ "${{ matrix.hardware }}" == "mock_cuda" ]; then
             printf '#!/bin/sh\necho "CUDA Version: 12.4"\n' > $HOME/mock_bin/nvidia-smi
             chmod +x $HOME/mock_bin/nvidia-smi
             if [ "${{ runner.os }}" == "Windows" ]; then
               echo '@echo CUDA Version: 12.4' > $HOME/mock_bin/nvidia-smi.bat
             fi
          elif [ "${{ matrix.hardware }}" == "mock_rocm" ]; then
             printf '#!/bin/sh\necho "mock"\n' > $HOME/mock_bin/rocm-smi
             chmod +x $HOME/mock_bin/rocm-smi
          fi
          echo "$HOME/mock_bin" >> $GITHUB_PATH

      - name: Start Local HTTP Server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process python -ArgumentList "-m", "http.server", "8000", "--bind", "127.0.0.1" -PassThru
          $healthy = $false
          for ($i = 0; $i -lt 10; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8000/scripts/install.ps1" -UseBasicParsing -ErrorAction Stop
              if ($resp.StatusCode -eq 200) { $healthy = $true; break }
            } catch {}
            Start-Sleep -Seconds 1
          }
          if (-not $healthy) {
            Write-Error "Local HTTP server failed to start on port 8000"
            exit 1
          }

      - name: Execute Install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The execution policy test: pipe from local server
          Invoke-RestMethod "http://127.0.0.1:8000/scripts/install.ps1" | Invoke-Expression
          
      - name: Execute Install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # For Unix, we test direct execution of the bash script
          bash scripts/install.sh
          
      - name: Verify CLI Entrypoint (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$HOME/.uv/bin:$PATH"
          motif --version
          motif --help
          
      - name: Verify CLI Entrypoint (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$HOME\.cargo\bin;$HOME\.local\bin;$env:APPDATA\uv\bin;$env:Path"
          motif --version
          motif --help

      - name: Strict Wheel Verification (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$HOME/.uv/bin:$PATH"
          TOOL_ENV="$HOME/.local/share/uv/tools/motif-rag"
          PYTHON_EXE="$TOOL_ENV/bin/python"
          
          if [ ! -f "$PYTHON_EXE" ]; then
             echo "Could not find python directly at $PYTHON_EXE, attempting fallback"
             uv tool run motif --version
          else
             EXPECTED_HW="cpu"
             if [ "${{ matrix.hardware }}" == "mock_cuda" ]; then EXPECTED_HW="cuda"; fi
             if [ "${{ matrix.hardware }}" == "mock_rocm" ]; then EXPECTED_HW="rocm"; fi
             "$PYTHON_EXE" tests/verify_wheel.py $EXPECTED_HW
          fi

      - name: Strict Wheel Verification (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$HOME\.cargo\bin;$HOME\.local\bin;$env:APPDATA\uv\bin;$env:Path"
          $TOOL_DIR = (uv tool dir).Trim()
          $TOOL_ENV = Join-Path $TOOL_DIR "motif-rag"
          $PYTHON_EXE = Join-Path $TOOL_ENV "Scripts\python.exe"
          
          if (-not (Test-Path $PYTHON_EXE)) {
             Write-Host "Could not find python directly at $PYTHON_EXE, attempting fallback"
             uv tool run motif --version
          } else {
             $EXPECTED_HW = "cpu"
             if ("${{ matrix.hardware }}" -eq "mock_cuda") { $EXPECTED_HW = "cuda" }
             if ("${{ matrix.hardware }}" -eq "mock_rocm") { $EXPECTED_HW = "rocm" }
             & $PYTHON_EXE tests\verify_wheel.py $EXPECTED_HW
          }

      - name: Model Setup Dry-Run Verification (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$HOME/.uv/bin:$PATH"
          motif setup --dry-run
          
      - name: Model Setup Dry-Run Verification (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path = "$HOME\.cargo\bin;$HOME\.local\bin;$env:APPDATA\uv\bin;$env:Path"
          motif setup --dry-run
          
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}-${{ matrix.install }}-${{ matrix.hardware }}-${{ matrix.python }}
          path: |
            ~/.motif/logs
            ~\.motif\logs
          if-no-files-found: ignore
